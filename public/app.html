<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SoundWave</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --black: #080810; --surface: #111118; --card: #1a1a24;
    --border: rgba(255,255,255,0.08); --text: #f0eff8;
    --muted: rgba(240,239,248,0.5); --accent: #c8ff57;
    --accent-dim: rgba(200,255,87,0.15); --love: #ff4d6d; --hate: #4d79ff;
    --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--black); color: var(--text); font-family: var(--font-body); }

  /* ── TOP BAR ── */
  #top-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; z-index: 20;
    background: linear-gradient(to bottom, rgba(8,8,16,0.85), transparent);
  }
  .logo { font-family: var(--font-head); font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .user-row { display: flex; align-items: center; gap: 10px; }
  .user-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1.5px solid var(--accent); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: var(--accent);
    font-family: var(--font-head); background: var(--accent-dim);
    cursor: pointer;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* ── LOADING ── */
  #loading {
    position: fixed; inset: 0; background: var(--black);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 50; gap: 16px;
  }
  .loading-logo { font-family: var(--font-head); font-size: 32px; font-weight: 800; }
  .loading-logo span { color: var(--accent); }
  .loading-bar { width: 120px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  .loading-fill { height: 100%; background: var(--accent); width: 0%; animation: loadfill 1.5s ease forwards; }
  @keyframes loadfill { to { width: 100%; } }
  .loading-text { font-size: 13px; color: var(--muted); }

  /* ── FEED ── */
  #feed { position: fixed; inset: 0; overflow: hidden; }

  .reel {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
  }
  .reel.exit-up { animation: exitUp 0.38s cubic-bezier(0.4,0,0.2,1) forwards; }
  .reel.exit-down { animation: exitDown 0.38s cubic-bezier(0.4,0,0.2,1) forwards; }
  .reel.enter-below { animation: enterBelow 0.38s cubic-bezier(0.4,0,0.2,1) forwards; }
  .reel.enter-above { animation: enterAbove 0.38s cubic-bezier(0.4,0,0.2,1) forwards; }

  @keyframes exitUp { to { transform: translateY(-100%); } }
  @keyframes exitDown { to { transform: translateY(100%); } }
  @keyframes enterBelow { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes enterAbove { from { transform: translateY(-100%); } to { transform: translateY(0); } }

  /* ── VISUAL BG ── */
  .reel-bg { position: absolute; inset: 0; overflow: hidden; }
  .reel-canvas { width: 100%; height: 100%; display: block; }
  .reel-album-art {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    opacity: 0; transition: opacity 0.5s;
  }
  .reel-album-art.visible { opacity: 0.45; }
  .reel-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      rgba(8,8,16,0.3) 0%, transparent 25%,
      transparent 45%, rgba(8,8,16,0.6) 70%,
      rgba(8,8,16,0.97) 100%);
  }

  /* ── CONTENT ── */
  .reel-content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 0 20px 95px; pointer-events: none;
  }
  .genre-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent-dim); border: 1px solid rgba(200,255,87,0.3);
    color: var(--accent); font-size: 11px; font-weight: 500;
    letter-spacing: 0.8px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 100px;
  }
  .indie-badge {
    background: rgba(255,77,109,0.12); border-color: rgba(255,77,109,0.35);
    color: #ff8fa3;
  }
  .tags-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .song-title { font-family: var(--font-head); font-size: 28px; font-weight: 700; line-height: 1.15; margin-bottom: 5px; text-shadow: 0 2px 20px rgba(0,0,0,0.6); }
  .song-artist { font-size: 15px; font-weight: 300; color: rgba(240,239,248,0.8); margin-bottom: 18px; }
  .song-artist small { color: var(--muted); font-size: 13px; }

  .song-actions { display: flex; align-items: center; gap: 10px; pointer-events: auto; }
  .spotify-btn {
    display: flex; align-items: center; gap: 8px;
    background: #1db954; color: #000; text-decoration: none;
    font-size: 13px; font-weight: 500; padding: 10px 18px;
    border-radius: 100px; transition: transform 0.15s, filter 0.15s;
  }
  .spotify-btn:hover { transform: scale(1.04); filter: brightness(1.1); }
  .spotify-btn svg { width: 16px; height: 16px; }

  .audio-info {
    font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px;
    pointer-events: none;
  }
  .audio-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: audiodot 1.2s ease-in-out infinite; }
  @keyframes audiodot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }

  /* ── SIDE ACTIONS ── */
  .side-actions {
    position: absolute; right: 16px; bottom: 120px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .action-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: transform 0.15s; }
  .action-btn:active { transform: scale(0.82); }
  .action-icon {
    width: 54px; height: 54px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(8,8,16,0.55); backdrop-filter: blur(12px);
    transition: background 0.2s, border-color 0.25s, transform 0.2s;
  }
  .action-btn.liked .action-icon { background: rgba(255,77,109,0.22); border-color: var(--love); }
  .action-btn.disliked .action-icon { background: rgba(77,121,255,0.22); border-color: var(--hate); }
  .action-label { font-size: 11px; color: var(--muted); }

  /* ── PROGRESS ── */
  .progress-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.1); }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.25s linear; }

  /* ── SCROLL HINT ── */
  .scroll-hint {
    position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: opacity 0.5s; pointer-events: none;
  }
  .scroll-hint.gone { opacity: 0; }
  .chevron { width: 18px; height: 18px; border-right: 2px solid rgba(255,255,255,0.45); border-bottom: 2px solid rgba(255,255,255,0.45); transform: rotate(45deg); animation: chev 1.5s ease-in-out infinite; }
  @keyframes chev { 0%,100% { transform: rotate(45deg) translateY(0); } 50% { transform: rotate(45deg) translateY(5px); } }

  /* ── BOTTOM NAV ── */
  #bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; height: 72px;
    background: rgba(8,8,16,0.92); backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-around;
    z-index: 20;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; color: var(--muted);
    font-family: var(--font-body); cursor: pointer; padding: 8px 18px;
    transition: color 0.15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; line-height: 1; }
  .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase; }

  /* ── LIKES PANEL ── */
  #likes-panel {
    position: fixed; inset: 0; background: var(--black);
    z-index: 30; overflow-y: auto; padding: 70px 20px 90px;
    display: none;
  }
  .panel-header {
    position: fixed; top: 0; left: 0; right: 0; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; background: rgba(8,8,16,0.95);
    backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
    z-index: 31;
  }
  .panel-title { font-family: var(--font-head); font-size: 18px; font-weight: 700; }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }

  .section-title { font-family: var(--font-head); font-size: 22px; font-weight: 700; margin-bottom: 20px; }
  .liked-list { display: flex; flex-direction: column; gap: 10px; }
  .liked-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--card); border-radius: 16px; padding: 12px;
    border: 1px solid var(--border);
  }
  .liked-art { width: 52px; height: 52px; border-radius: 10px; object-fit: cover; background: #222; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .liked-art img { width: 100%; height: 100%; border-radius: 10px; object-fit: cover; }
  .liked-info { flex: 1; min-width: 0; }
  .liked-name { font-family: var(--font-head); font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .liked-by { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .liked-genre-tag { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; color: var(--accent); margin-top: 4px; }
  .liked-open { width: 36px; height: 36px; border-radius: 50%; background: #1db954; display: flex; align-items: center; justify-content: center; color: #000; text-decoration: none; font-size: 15px; flex-shrink: 0; transition: transform 0.15s; }
  .liked-open:hover { transform: scale(1.1); }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%) translateY(12px);
    background: rgba(26,26,36,0.95); border: 1px solid var(--border);
    color: var(--text); font-size: 13px; padding: 10px 20px;
    border-radius: 100px; opacity: 0; transition: opacity 0.25s, transform 0.25s;
    z-index: 40; white-space: nowrap; pointer-events: none;
    backdrop-filter: blur(12px);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── NO PREVIEW NOTICE ── */
  .no-preview { font-size: 12px; color: rgba(255,150,50,0.8); }

  /* ── GENRE PANEL ── */
  #genre-panel {
    position: fixed; inset: 0; background: var(--black);
    z-index: 30; overflow-y: auto; padding: 70px 20px 90px;
    display: none;
  }
  .genre-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
  .genre-card {
    border-radius: 16px; padding: 20px 16px; cursor: pointer;
    border: 1px solid var(--border); transition: transform 0.15s, border-color 0.15s;
    position: relative; overflow: hidden; min-height: 90px;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .genre-card:active { transform: scale(0.96); }
  .genre-card.active-genre { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .genre-card-bg { position: absolute; inset: 0; opacity: 0.4; }
  .genre-card-name { font-family: var(--font-head); font-size: 16px; font-weight: 700; position: relative; z-index: 1; text-shadow: 0 1px 8px rgba(0,0,0,0.9); }
  .genre-card-sub { font-size: 11px; color: rgba(240,239,248,0.75); margin-top: 2px; position: relative; z-index: 1; text-shadow: 0 1px 4px rgba(0,0,0,0.9); }
  .genre-now-playing { font-size: 11px; color: var(--accent); margin-top: 4px; position: relative; z-index: 1; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }

  /* ── PROFILE PANEL ── */
  #profile-panel {
    position: fixed; inset: 0; background: var(--black);
    z-index: 30; overflow-y: auto; padding: 70px 20px 90px;
    display: none;
  }

  .profile-hero {
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 0 32px; text-align: center;
    border-bottom: 1px solid var(--border); margin-bottom: 28px;
  }

  .profile-avatar-wrap {
    position: relative; margin-bottom: 16px;
  }

  .profile-avatar {
    width: 88px; height: 88px; border-radius: 50%;
    border: 2.5px solid var(--accent);
    background: var(--accent-dim);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-head); font-size: 32px; font-weight: 700;
    color: var(--accent); overflow: hidden;
  }

  .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .profile-name {
    font-family: var(--font-head); font-size: 24px; font-weight: 800;
    letter-spacing: -0.5px; margin-bottom: 6px;
  }

  .profile-handle {
    font-size: 13px; color: var(--muted); margin-bottom: 16px;
  }

  .profile-stats {
    display: flex; gap: 28px;
  }

  .profile-stat { text-align: center; }
  .profile-stat-num { font-family: var(--font-head); font-size: 20px; font-weight: 700; color: var(--accent); }
  .profile-stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  .profile-section-title {
    font-family: var(--font-head); font-size: 16px; font-weight: 700;
    margin-bottom: 14px; color: var(--text);
  }

  .profile-section { margin-bottom: 28px; }

  .genre-pill-row { display: flex; flex-wrap: wrap; gap: 8px; }

  .genre-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 100px;
    border: 1px solid var(--border);
    font-size: 13px; font-weight: 500;
    background: var(--card);
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
  }

  .genre-pill:hover { border-color: var(--accent); background: var(--accent-dim); }

  .genre-pill-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }

  .recent-liked-list { display: flex; flex-direction: column; gap: 10px; }

  .recent-track {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border-radius: 14px; padding: 10px 12px;
    border: 1px solid var(--border);
  }

  .recent-track-art {
    width: 46px; height: 46px; border-radius: 8px;
    flex-shrink: 0; background: #222;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; overflow: hidden;
  }

  .recent-track-art img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }

  .recent-track-info { flex: 1; min-width: 0; }
  .recent-track-title { font-family: var(--font-head); font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recent-track-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .recent-track-open {
    width: 32px; height: 32px; border-radius: 50%;
    background: #1db954; display: flex; align-items: center; justify-content: center;
    color: #000; text-decoration: none; font-size: 13px;
    flex-shrink: 0; transition: transform 0.15s;
  }

  .recent-track-open:hover { transform: scale(1.1); }

  .logout-btn {
    width: 100%; padding: 14px; border-radius: 100px;
    border: 1px solid rgba(255,80,80,0.3);
    background: rgba(255,80,80,0.08);
    color: #ff8080; font-family: var(--font-body);
    font-size: 14px; cursor: pointer; transition: background 0.15s;
    margin-top: 8px;
  }

  .logout-btn:hover { background: rgba(255,80,80,0.15); }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="loading-logo">Sound<span>Wave</span></div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-text" id="loading-text">Connecting to Spotify…</div>
</div>

<!-- TOP BAR -->
<div id="top-bar" style="display:none">
  <div class="logo">Sound<span>Wave</span></div>
  <div class="user-row">
    <div class="user-avatar" id="avatar">G</div>
  </div>
</div>

<!-- FEED -->
<div id="feed" style="display:none"></div>

<!-- BOTTOM NAV -->
<div id="bottom-nav" style="display:none">
  <button class="nav-btn active" id="nav-discover" onclick="showFeed()">
    <span class="nav-icon">⊕</span><span class="nav-label">Discover</span>
  </button>
  <button class="nav-btn" id="nav-liked" onclick="showLikes()">
    <span class="nav-icon">♥</span><span class="nav-label">Liked</span>
  </button>
  <button class="nav-btn" id="nav-genres" onclick="showGenres()">
    <span class="nav-icon">◈</span><span class="nav-label">Genres</span>
  </button>
  <button class="nav-btn" id="nav-profile" onclick="showProfile()">
    <span class="nav-icon">◯</span><span class="nav-label">Profile</span>
  </button>
</div>

<!-- LIKES PANEL -->
<div id="likes-panel">
  <div class="panel-header">
    <div class="panel-title">Liked Tracks</div>
    <button class="close-btn" onclick="showFeed()">✕</button>
  </div>
  <div class="section-title" style="margin-top:10px">Your Library</div>
  <div class="liked-list" id="liked-list"></div>
</div>

<!-- GENRE PANEL -->
<div id="genre-panel">
  <div class="panel-header">
    <div class="panel-title">Genres</div>
    <button class="close-btn" onclick="showFeed()">✕</button>
  </div>
  <div class="section-title" style="margin-top:10px">Pick a vibe</div>
  <div class="genre-grid" id="genre-grid"></div>
</div>

<!-- PROFILE PANEL -->
<div id="profile-panel">
  <div class="panel-header">
    <div class="panel-title">Profile</div>
    <button class="close-btn" onclick="showFeed()">✕</button>
  </div>

  <!-- Hero -->
  <div class="profile-hero">
    <div class="profile-avatar-wrap">
      <div class="profile-avatar" id="profile-avatar">G</div>
    </div>
    <div class="profile-name" id="profile-name">Loading…</div>
    <div class="profile-handle" id="profile-handle">@soundwave</div>
    <div class="profile-stats">
      <div class="profile-stat">
        <div class="profile-stat-num" id="stat-liked">0</div>
        <div class="profile-stat-label">Liked</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-num" id="stat-genres">0</div>
        <div class="profile-stat-label">Genres</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-num" id="stat-skipped">0</div>
        <div class="profile-stat-label">Skipped</div>
      </div>
    </div>
  </div>

  <!-- Top Genres -->
  <div class="profile-section">
    <div class="profile-section-title">Top Genres</div>
    <div class="genre-pill-row" id="profile-genres">
      <div style="color:var(--muted);font-size:14px">Like some tracks to see your top genres</div>
    </div>
  </div>

  <!-- Recently Liked -->
  <div class="profile-section">
    <div class="profile-section-title">Recently Liked</div>
    <div class="recent-liked-list" id="profile-recent">
      <div style="color:var(--muted);font-size:14px">No liked tracks yet</div>
    </div>
  </div>

  <!-- Logout -->
  <button class="logout-btn" onclick="window.location.href='/auth/logout'">Log out of Spotify</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- Spotify Web Playback SDK -->
<script src="https://sdk.scdn.co/spotify-player.js"></script>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────────────────────

let accessToken = null;
let spotifyPlayer = null;
let deviceId = null;
let playerReady = false;

let queue = [];          // Track objects
let currentIndex = 0;
let likedTracks = [];
let dislikedIds = new Set();
let hasScrolled = false;
let transitioning = false;
let progressTimer = null;
let animFrames = {};
let activeGenreQuery = null; // null = all genres, string = locked to this query

// ─────────────────────────────────────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────────────────────────────────────

async function boot() {
  try {
    const [tokenRes, meRes] = await Promise.all([
      fetch('/api/token').then(r => r.json()),
      fetch('/api/me').then(r => r.json())
    ]);

    if (tokenRes.error || meRes.error) { window.location.href = '/'; return; }

    accessToken = tokenRes.access_token;

    const avatar = document.getElementById('avatar');
    if (meRes.image) {
      avatar.innerHTML = `<img src="${meRes.image}" alt="${meRes.name}">`;
    } else {
      avatar.textContent = (meRes.name || 'U')[0].toUpperCase();
    }

    setLoading('Loading tracks…');
    await initPlayer();
    await loadInitialTracks();
    hideLoading();

  } catch (e) {
    console.error('Boot error:', e);
    setLoading('Something went wrong. Redirecting…');
    setTimeout(() => window.location.href = '/', 2000);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  SPOTIFY WEB PLAYBACK SDK
// ─────────────────────────────────────────────────────────────────────────────

window.onSpotifyWebPlaybackSDKReady = () => {
  // SDK ready — player init happens after token is fetched
};

function initPlayer() {
  return new Promise((resolve) => {
    spotifyPlayer = new Spotify.Player({
      name: 'SoundWave',
      getOAuthToken: async (cb) => {
        // Always fetch a fresh token from server (auto-refreshes if needed)
        const res = await fetch('/api/token').then(r => r.json());
        if (res.access_token) {
          accessToken = res.access_token;
          cb(res.access_token);
        }
      },
      volume: 0.8
    });

    spotifyPlayer.addListener('ready', ({ device_id }) => {
      console.log('Spotify player ready, device:', device_id);
      deviceId = device_id;
      playerReady = true;
      resolve();
    });

    spotifyPlayer.addListener('not_ready', ({ device_id }) => {
      console.warn('Player not ready:', device_id);
      playerReady = false;
    });

    spotifyPlayer.addListener('player_state_changed', (state) => {
      if (!state) return;
      // Could use this for richer UI sync later
    });

    spotifyPlayer.addListener('initialization_error', ({ message }) => {
      console.error('Init error:', message);
      resolve(); // Continue without player
    });

    spotifyPlayer.addListener('authentication_error', ({ message }) => {
      console.error('Auth error:', message);
      resolve();
    });

    spotifyPlayer.addListener('account_error', ({ message }) => {
      console.error('Account error:', message);
      toast('⚠️ Spotify Premium required for audio playback');
      resolve();
    });

    spotifyPlayer.connect();

    // Timeout — don't block app if SDK is slow
    setTimeout(resolve, 6000);
  });
}

async function playTrack(trackUri) {
  if (!playerReady || !deviceId) {
    console.warn('Player not ready for playback');
    return;
  }

  try {
    // Transfer playback to our device
    await fetch(`https://api.spotify.com/v1/me/player`, {
      method: 'PUT',
      headers: {
        Authorization: `Bearer ${accessToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        device_ids: [deviceId],
        play: false
      })
    });

    // Play the track
    await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
      method: 'PUT',
      headers: {
        Authorization: `Bearer ${accessToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        uris: [trackUri],
        position_ms: 30000 // Start at 30s to hit the chorus
      })
    });

  } catch (e) {
    console.error('Playback error:', e);
  }
}

async function stopPlayback() {
  if (!playerReady) return;
  try {
    await fetch(`https://api.spotify.com/v1/me/player/pause?device_id=${deviceId}`, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${accessToken}` }
    });
  } catch (e) { /* silent */ }
}

// ─────────────────────────────────────────────────────────────────────────────
//  TRACK LOADING
// ─────────────────────────────────────────────────────────────────────────────

async function loadInitialTracks() {
  activeGenreQuery = null; // start with all genres shuffled
  const res = await fetch('/api/tracks').then(r => r.json());
  if (res.tracks?.length) {
    queue = res.tracks;
    renderReel(queue[0]);
  } else {
    setLoading('No tracks found. Try again later.');
  }
}

async function loadMoreTracks(likedTrackIds = []) {
  try {
    let res;
    if (activeGenreQuery) {
      // Locked to a specific genre — keep fetching only from that genre
      res = await fetch('/api/tracks?genre=' + encodeURIComponent(activeGenreQuery)).then(r => r.json());
    } else {
      // All genres — use recommend endpoint
      const body = { liked_track_ids: likedTrackIds };
      res = await fetch('/api/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }).then(r => r.json());
    }

    if (res.tracks?.length) {
      const newTracks = res.tracks.filter(t =>
        !queue.some(q => q.id === t.id) && !dislikedIds.has(t.id)
      );
      queue.push(...newTracks);
    }
  } catch (e) {
    console.error('Load more error:', e);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  VISUAL ENGINE (canvas animations)
// ─────────────────────────────────────────────────────────────────────────────

const BG_CONFIGS = [
  { type: 'wave',   colors: ['#0d0020','#3d0a66','#7b2acc','#c8ff57'] },
  { type: 'aurora', colors: ['#020d1a','#0d2a4a','#1a6677','#57ffd8'] },
  { type: 'prism',  colors: ['#0a0020','#300060','#8020c0','#ff57cc'] },
  { type: 'ember',  colors: ['#0f0400','#3a1200','#aa3d00','#ff9340'] },
  { type: 'deep',   colors: ['#020212','#080825','#1a1a5a','#5757ff'] },
  { type: 'bloom',  colors: ['#0f0010','#350040','#990090','#ff57ee'] },
  { type: 'forest', colors: ['#020c04','#082010','#125522','#57ff88'] },
  { type: 'smoke',  colors: ['#080808','#181818','#383838','#d0d0d0'] },
];

function getBgConfig(index) {
  return BG_CONFIGS[index % BG_CONFIGS.length];
}

function drawCanvas(canvas, config, phase) {
  const W = canvas.width = canvas.offsetWidth || window.innerWidth;
  const H = canvas.height = canvas.offsetHeight || window.innerHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = config.colors[0];
  ctx.fillRect(0, 0, W, H);

  const t = phase;
  const c = config.colors;

  if (config.type === 'wave') {
    for (let i = 0; i < 5; i++) {
      ctx.beginPath(); ctx.moveTo(0, H);
      for (let x = 0; x <= W; x += 4) {
        const y = H * (0.25 + i * 0.13) + Math.sin(x * 0.007 + t * 0.9 + i * 0.8) * 90 + Math.sin(x * 0.014 + t * 1.3 - i) * 35;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H); ctx.closePath();
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, c[1 + (i % 2)] + '77'); g.addColorStop(1, c[0] + '00');
      ctx.fillStyle = g; ctx.fill();
    }
    const gr = ctx.createRadialGradient(W*0.6+Math.sin(t*0.4)*50, H*0.3, 0, W*0.6, H*0.3, 220);
    gr.addColorStop(0, c[3]+'44'); gr.addColorStop(1,'transparent');
    ctx.fillStyle = gr; ctx.fillRect(0,0,W,H);

  } else if (config.type === 'aurora') {
    for (let i = 0; i < 5; i++) {
      const yb = H * (0.15 + i * 0.17);
      ctx.beginPath();
      for (let x = 0; x <= W; x += 5) {
        const y = yb + Math.sin(x * 0.005 + t * 0.45 + i * 1.1) * 70;
        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = (i % 2 === 0 ? c[2] : c[3]) + '44';
      ctx.lineWidth = 50; ctx.filter = 'blur(18px)'; ctx.stroke(); ctx.filter = 'none';
    }

  } else if (config.type === 'prism') {
    const cx = W/2, cy = H*0.4;
    for (let i = 0; i < 9; i++) {
      const angle = (i/9)*Math.PI*2 + t*0.25;
      const g = ctx.createLinearGradient(cx, cy, cx+Math.cos(angle)*W, cy+Math.sin(angle)*H);
      g.addColorStop(0, c[i%2===0?2:3]+'2a'); g.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, Math.max(W,H)*1.5, angle-0.18, angle+0.18);
      ctx.closePath(); ctx.fillStyle = g; ctx.fill();
    }

  } else if (config.type === 'ember') {
    for (let i = 0; i < 50; i++) {
      const bx = ((i*47+13)%100)/100*W;
      const sp = 0.25 + (i%5)*0.18;
      const py = H - ((t*sp*80 + i*40) % H);
      const r = 3 + (i%4)*2;
      const g = ctx.createRadialGradient(bx, py, 0, bx, py, r*6);
      g.addColorStop(0, c[3]+'bb'); g.addColorStop(0.5, c[2]+'33'); g.addColorStop(1,'transparent');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(bx, py, r*6, 0, Math.PI*2); ctx.fill();
    }

  } else if (config.type === 'deep') {
    for (let i = 0; i < 100; i++) {
      const px = ((i*137.508+11)%100)/100*W, py = ((i*97.32+7)%100)/100*H;
      const alpha = 0.25 + (Math.sin(t*1.8+i)+1)*0.35;
      ctx.fillStyle = c[3] + Math.floor(alpha*255).toString(16).padStart(2,'0');
      ctx.beginPath(); ctx.arc(px, py, 0.8+(i%3)*0.6, 0, Math.PI*2); ctx.fill();
    }
    const gr = ctx.createRadialGradient(W/2, H*0.4, 0, W/2, H*0.4, 280);
    gr.addColorStop(0, c[2]+'33'); gr.addColorStop(1,'transparent');
    ctx.fillStyle = gr; ctx.fillRect(0,0,W,H);

  } else if (config.type === 'bloom') {
    for (let i = 6; i >= 0; i--) {
      const r = (60 + i*70) * (1 + Math.sin(t*0.55+i*0.6)*0.08);
      const cx = W*0.5 + Math.sin(t*0.25)*25, cy = H*0.38 + Math.cos(t*0.35)*18;
      const gr = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      gr.addColorStop(0, c[3]+'20'); gr.addColorStop(0.5, c[2]+'15'); gr.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fillStyle = gr; ctx.fill();
    }

  } else if (config.type === 'forest') {
    for (let i = 0; i < 70; i++) {
      const px = ((i*137.5+42)%100)/100*W, py = ((i*97.3+42)%100)/100*H;
      const r = 4 + (i%5)*5;
      const ox = Math.sin(t*0.5+i)*18, oy = Math.cos(t*0.4+i*0.8)*13;
      const gr = ctx.createRadialGradient(px+ox, py+oy, 0, px+ox, py+oy, r+18);
      gr.addColorStop(0, c[3]+'3a'); gr.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(px+ox, py+oy, r+18, 0, Math.PI*2); ctx.fillStyle = gr; ctx.fill();
    }

  } else { // smoke
    for (let i = 0; i < 8; i++) {
      const cx = W*(i+1)/9 + Math.sin(t*0.18+i)*45;
      const cy = H*0.4 + Math.cos(t*0.14+i*0.8)*65;
      const gr = ctx.createRadialGradient(cx, cy, 0, cx, cy, 160);
      gr.addColorStop(0, c[1+(i%2)]+'2a'); gr.addColorStop(1,'transparent');
      ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(cx, cy, 160, 0, Math.PI*2); ctx.fill();
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  REEL RENDERING
// ─────────────────────────────────────────────────────────────────────────────

function renderReel(track) {
  const feed = document.getElementById('feed');
  const reel = buildReelEl(track, currentIndex);
  feed.innerHTML = '';
  feed.appendChild(reel);

  // Start canvas animation
  startCanvasAnim(reel, track);

  // Album art background
  if (track.album_art) {
    const art = reel.querySelector('.reel-album-art');
    art.style.backgroundImage = `url(${track.album_art})`;
    requestAnimationFrame(() => art.classList.add('visible'));
  }

  // Start playback
  if (playerReady && track.id) {
    playTrack(`spotify:track:${track.id}`);
  }

  startProgressBar(reel);
  setupSwipeOnFeed();

  if (hasScrolled) hideScrollHint(reel);
}

function buildReelEl(track, index) {
  const div = document.createElement('div');
  div.className = 'reel';
  div.dataset.trackId = track.id;

  const isLiked = likedTracks.some(t => t.id === track.id);
  const isDisliked = dislikedIds.has(track.id);
  const indieHtml = track.indie
    ? `<span class="genre-tag indie-badge">★ indie</span>` : '';

  const audioHtml = track.preview_url && !playerReady
    ? `<span class="no-preview">⚠ Full audio needs Spotify SDK</span>` : '';

  div.innerHTML = `
    <div class="reel-bg">
      <canvas class="reel-canvas"></canvas>
      <div class="reel-album-art"></div>
      <div class="reel-overlay"></div>
    </div>

    <div class="reel-content">
      <div>
        <div class="tags-row">
          <span class="genre-tag">${track.genre || 'indie'}</span>
          ${indieHtml}
        </div>
        <div class="song-title">${track.title}</div>
        <div class="song-artist">${track.artist}
          ${track.popularity != null ? `<small>· popularity ${track.popularity}</small>` : ''}
        </div>
        <div class="song-actions">
          <a href="${track.spotify_url}" target="_blank" class="spotify-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
            Open in Spotify
          </a>
          ${playerReady ? `<div class="audio-info"><div class="audio-dot"></div> Playing chorus</div>` : ''}
        </div>
        ${audioHtml}
      </div>
    </div>

    <div class="side-actions">
      <div class="action-btn ${isLiked ? 'liked' : ''}" id="like-btn-${track.id}" onclick="handleLike('${track.id}')">
        <div class="action-icon">♥</div>
        <span class="action-label">Like</span>
      </div>
      <div class="action-btn ${isDisliked ? 'disliked' : ''}" id="dislike-btn-${track.id}" onclick="handleDislike('${track.id}')">
        <div class="action-icon">✕</div>
        <span class="action-label">Skip</span>
      </div>
    </div>

    <div class="progress-bar"><div class="progress-fill"></div></div>
    <div class="scroll-hint"><div class="chevron"></div></div>
  `;

  return div;
}

function startCanvasAnim(reel, track) {
  const canvas = reel.querySelector('.reel-canvas');
  const config = getBgConfig(currentIndex);
  let phase = 0;
  let rafId;

  function frame() {
    phase += 0.012;
    drawCanvas(canvas, config, phase);
    rafId = requestAnimationFrame(frame);
  }

  frame();
  reel._rafId = rafId;
  reel._stop = () => cancelAnimationFrame(rafId);
}

function startProgressBar(reel) {
  const fill = reel.querySelector('.progress-fill');
  let pct = 0;
  if (progressTimer) clearInterval(progressTimer);
  progressTimer = setInterval(() => {
    pct += 100 / 150; // 15 seconds
    fill.style.width = Math.min(pct, 100) + '%';
    if (pct >= 100) {
      clearInterval(progressTimer);
      // Auto-advance
      navigateNext();
    }
  }, 100);
}

function hideScrollHint(reel) {
  const hint = reel?.querySelector('.scroll-hint');
  if (hint) hint.classList.add('gone');
}

// ─────────────────────────────────────────────────────────────────────────────
//  NAVIGATION
// ─────────────────────────────────────────────────────────────────────────────

function setupSwipeOnFeed() {
  const feed = document.getElementById('feed');
  let startY = 0;

  feed.ontouchstart = e => { startY = e.touches[0].clientY; };
  feed.ontouchend = e => {
    const diff = startY - e.changedTouches[0].clientY;
    if (Math.abs(diff) > 45) diff > 0 ? navigateNext() : navigatePrev();
  };

  let wheelLock = false;
  feed.onwheel = e => {
    if (wheelLock) return;
    wheelLock = true;
    if (e.deltaY > 25) navigateNext();
    else if (e.deltaY < -25) navigatePrev();
    setTimeout(() => wheelLock = false, 550);
  };
}

function navigateNext() {
  if (transitioning) return;
  if (currentIndex >= queue.length - 1) {
    toast('Loading more…');
    const likedIds = likedTracks.map(t => t.id);
    loadMoreTracks(likedIds).then(() => {
      if (currentIndex < queue.length - 1) doTransition('up');
    });
    return;
  }
  doTransition('up');
}

function navigatePrev() {
  if (transitioning || currentIndex <= 0) return;
  doTransition('down');
}

function doTransition(dir) {
  if (transitioning) return;
  transitioning = true;
  hasScrolled = true;

  const feed = document.getElementById('feed');
  const current = feed.querySelector('.reel');

  if (dir === 'up') currentIndex++;
  else currentIndex--;

  const nextTrack = queue[currentIndex];
  const next = buildReelEl(nextTrack, currentIndex);
  feed.appendChild(next);

  current.classList.add(dir === 'up' ? 'exit-up' : 'exit-down');
  next.classList.add(dir === 'up' ? 'enter-below' : 'enter-above');

  startCanvasAnim(next, nextTrack);
  if (nextTrack.album_art) {
    const art = next.querySelector('.reel-album-art');
    art.style.backgroundImage = `url(${nextTrack.album_art})`;
    requestAnimationFrame(() => art.classList.add('visible'));
  }

  if (current._stop) current._stop();
  if (progressTimer) clearInterval(progressTimer);

  if (playerReady && nextTrack.id) playTrack(`spotify:track:${nextTrack.id}`);
  startProgressBar(next);
  hideScrollHint(next);

  setTimeout(() => {
    if (feed.contains(current)) feed.removeChild(current);
    transitioning = false;
  }, 420);

  // Pre-load more when near the end
  if (currentIndex >= queue.length - 3) {
    loadMoreTracks(likedTracks.map(t => t.id));
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  LIKE / DISLIKE
// ─────────────────────────────────────────────────────────────────────────────

async function handleLike(trackId) {
  const track = queue.find(t => t.id === trackId);
  if (!track) return;

  const btn = document.getElementById(`like-btn-${trackId}`);
  const alreadyLiked = likedTracks.some(t => t.id === trackId);

  if (alreadyLiked) {
    likedTracks = likedTracks.filter(t => t.id !== trackId);
    btn?.classList.remove('liked');
    toast('Removed from liked');
    return;
  }

  likedTracks.push(track);
  btn?.classList.add('liked');
  btn?.classList.remove('disliked');
  dislikedIds.delete(trackId);
  toast('♥ Liked · Finding similar tracks');
  loadMoreTracks(likedTracks.map(t => t.id));
}

function handleDislike(trackId) {
  dislikedIds.add(trackId);
  const btn = document.getElementById(`dislike-btn-${trackId}`);
  btn?.classList.add('disliked');
  btn?.classList.remove('liked');
  likedTracks = likedTracks.filter(t => t.id !== trackId);
  toast('Skipping similar tracks');
  setTimeout(navigateNext, 300);
}

//  PANEL SWITCHING
// ─────────────────────────────────────────────────────────────────────────────

function showFeed() {
  document.getElementById('likes-panel').style.display = 'none';
  document.getElementById('genre-panel').style.display = 'none';
  document.getElementById('profile-panel').style.display = 'none';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-discover').classList.add('active');
}

function showLikes() {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-liked').classList.add('active');
  document.getElementById('likes-panel').style.display = 'block';
  document.getElementById('genre-panel').style.display = 'none';
  document.getElementById('profile-panel').style.display = 'none';

  const list = document.getElementById('liked-list');
  if (likedTracks.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">♡</div><div class="empty-text">Like tracks as you discover them</div></div>`;
  } else {
    list.innerHTML = likedTracks.map(t => `
      <div class="liked-card">
        <div class="liked-art">
          ${t.album_art ? `<img src="${t.album_art}" alt="${t.title}">` : '🎵'}
        </div>
        <div class="liked-info">
          <div class="liked-name">${t.title}</div>
          <div class="liked-by">${t.artist}</div>
          <div class="liked-genre-tag">${t.genre || 'indie'}${t.indie ? ' · indie' : ''}</div>
        </div>
        <a href="${t.spotify_url}" target="_blank" class="liked-open">♫</a>
      </div>
    `).join('');
  }
}

//  HELPERS
// ─────────────────────────────────────────────────────────────────────────────

function setLoading(msg) {
  document.getElementById('loading-text').textContent = msg;
}

function hideLoading() {
  document.getElementById('loading').style.opacity = '0';
  document.getElementById('loading').style.transition = 'opacity 0.4s';
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('top-bar').style.display = 'flex';
    document.getElementById('feed').style.display = 'block';
    document.getElementById('bottom-nav').style.display = 'flex';
  }, 400);
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─────────────────────────────────────────────────────────────────────────────
//  PROFILE PANEL
// ─────────────────────────────────────────────────────────────────────────────

const GENRE_COLORS = {
  'indie folk': '#57ff8a', 'indie pop': '#c857ff', 'dream pop': '#57b0ff',
  'bedroom pop': '#ff8a57', 'indie rock': '#c8ff57', 'shoegaze': '#ff57d4',
  'alt r&b': '#ff5757', 'psychedelic': '#d4ff57', 'emo indie': '#5757ff', 'folk pop': '#ffaa57'
};

function showProfile() {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-profile').classList.add('active');
  document.getElementById('likes-panel').style.display = 'none';
  document.getElementById('genre-panel').style.display = 'none';
  document.getElementById('profile-panel').style.display = 'block';

  // Fill in user info from cached session data
  const nameEl = document.getElementById('profile-name');
  const handleEl = document.getElementById('profile-handle');
  const avatarEl = document.getElementById('profile-avatar');

  fetch('/api/me').then(r => r.json()).then(user => {
    nameEl.textContent = user.name || 'Music Lover';
    handleEl.textContent = '@' + (user.id || 'soundwave').toLowerCase();
    if (user.image) {
      avatarEl.innerHTML = `<img src="${user.image}" alt="${user.name}">`;
    } else {
      avatarEl.textContent = (user.name || 'G')[0].toUpperCase();
    }
  }).catch(() => {
    nameEl.textContent = 'Music Lover';
  });

  // Stats
  document.getElementById('stat-liked').textContent = likedTracks.length;
  document.getElementById('stat-skipped').textContent = dislikedIds.size;

  // Compute top genres from liked tracks
  const genreCounts = {};
  likedTracks.forEach(t => {
    const g = (t.genre || 'indie').toLowerCase().split(' ').slice(0, 2).join(' ');
    genreCounts[g] = (genreCounts[g] || 0) + 1;
  });
  const topGenres = Object.entries(genreCounts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 5);

  document.getElementById('stat-genres').textContent = topGenres.length;

  const genreRow = document.getElementById('profile-genres');
  if (topGenres.length === 0) {
    genreRow.innerHTML = `<div style="color:var(--muted);font-size:14px">Like some tracks to see your top genres</div>`;
  } else {
    genreRow.innerHTML = topGenres.map(([genre, count]) => {
      const color = GENRE_COLORS[genre] || '#c8ff57';
      return `
        <div class="genre-pill" onclick="selectGenreByName('${genre}')">
          <div class="genre-pill-dot" style="background:${color}"></div>
          ${genre} <span style="color:var(--muted);font-size:11px;margin-left:2px">×${count}</span>
        </div>
      `;
    }).join('');
  }

  // Recently liked — show last 3
  const recentEl = document.getElementById('profile-recent');
  const recent = [...likedTracks].reverse().slice(0, 3);
  if (recent.length === 0) {
    recentEl.innerHTML = `<div style="color:var(--muted);font-size:14px">No liked tracks yet</div>`;
  } else {
    recentEl.innerHTML = recent.map(t => `
      <div class="recent-track">
        <div class="recent-track-art">
          ${t.album_art ? `<img src="${t.album_art}" alt="${t.title}">` : '🎵'}
        </div>
        <div class="recent-track-info">
          <div class="recent-track-title">${t.title}</div>
          <div class="recent-track-artist">${t.artist}${t.indie ? ' · ★ indie' : ''}</div>
        </div>
        <a href="${t.spotify_url}" target="_blank" class="recent-track-open">♫</a>
      </div>
    `).join('');
  }
}

function selectGenreByName(genreName) {
  // Find matching genre in GENRES array and select it
  const idx = GENRES.findIndex(g => g.name.toLowerCase() === genreName.toLowerCase());
  if (idx >= 0) {
    selectGenre(idx);
  } else {
    // Fallback: search directly
    showFeed();
    fetch('/api/tracks?genre=' + encodeURIComponent(genreName + ' indie underground'))
      .then(r => r.json()).then(res => {
        if (res.tracks && res.tracks.length) {
          queue = res.tracks; currentIndex = 0;
          renderReel(queue[0]);
          toast('Playing ' + genreName + ' ♪');
        }
      });
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  GENRE PANEL
// ─────────────────────────────────────────────────────────────────────────────

const GENRES = [
  { name: 'Indie Folk',    query: 'indie folk acoustic underground',  color: '#1a4a2a', accent: '#57ff8a', sub: 'Acoustic · Raw · Emotional' },
  { name: 'Indie Pop',     query: 'indie pop lo-fi bedroom',          color: '#2a1a4a', accent: '#c857ff', sub: 'Dreamy · Catchy · Chill' },
  { name: 'Dream Pop',     query: 'dream pop shoegaze ethereal',      color: '#0a1a3a', accent: '#57b0ff', sub: 'Ethereal · Hazy · Lush' },
  { name: 'Bedroom Pop',   query: 'bedroom pop lo-fi indie',          color: '#3a1a1a', accent: '#ff8a57', sub: 'Lo-fi · Intimate · Warm' },
  { name: 'Indie Rock',    query: 'indie rock underground guitar',     color: '#1a1a1a', accent: '#c8ff57', sub: 'Guitar · Gritty · Energetic' },
  { name: 'Shoegaze',      query: 'shoegaze noise pop indie',         color: '#1a0a3a', accent: '#ff57d4', sub: 'Noisy · Layered · Hypnotic' },
  { name: 'Alt R&B',       query: 'alternative rnb indie soul',       color: '#2a0a0a', accent: '#ff5757', sub: 'Soulful · Smooth · Modern' },
  { name: 'Psychedelic',   query: 'psychedelic indie rock underground',color: '#1a2a0a', accent: '#d4ff57', sub: 'Trippy · Groovy · Cosmic' },
  { name: 'Emo Indie',     query: 'emo indie rock underground',       color: '#0a0a2a', accent: '#5757ff', sub: 'Emotional · Intense · Raw' },
  { name: 'Folk Pop',      query: 'folk pop indie acoustic',          color: '#2a1a0a', accent: '#ffaa57', sub: 'Gentle · Storytelling · Warm' },
];

let activeGenre = null;

function showGenres() {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-genres').classList.add('active');
  document.getElementById('likes-panel').style.display = 'none';
  document.getElementById('profile-panel').style.display = 'none';
  document.getElementById('genre-panel').style.display = 'block';

  const grid = document.getElementById('genre-grid');

  // "All Genres" card spans full width at top
  const allCard = `
    <div class="genre-card ${activeGenre === 'all' ? 'active-genre' : ''}"
         onclick="selectAllGenres()"
         style="grid-column: 1 / -1; min-height: 70px; background: var(--card);">
      <div class="genre-card-bg" style="background: linear-gradient(135deg, #0a0a14, #1a1a2e);"></div>
      <div style="display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1;">
        <div>
          <div class="genre-card-name">✦ All Genres</div>
          <div class="genre-card-sub">Shuffle everything · Discover anything</div>
          ${activeGenre === 'all' ? `<div class="genre-now-playing">▶ Now playing</div>` : ''}
        </div>
        <div style="font-size:28px; opacity:0.6">⟳</div>
      </div>
    </div>
  `;

  grid.innerHTML = allCard + GENRES.map((g, i) => `
    <div class="genre-card ${activeGenre === i ? 'active-genre' : ''}" onclick="selectGenre(${i})">
      <div class="genre-card-bg" style="background: linear-gradient(135deg, ${g.color}, ${g.accent}44);"></div>
      <div class="genre-card-name">${g.name}</div>
      <div class="genre-card-sub">${g.sub}</div>
      ${activeGenre === i ? `<div class="genre-now-playing">▶ Now playing</div>` : ''}
    </div>
  `).join('');
}

async function selectAllGenres() {
  activeGenre = 'all';
  activeGenreQuery = null; // unlock — back to shuffled mix
  toast('Shuffling all genres…');
  showGenres();

  try {
    const res = await fetch('/api/tracks').then(r => r.json());
    if (res.tracks && res.tracks.length) {
      queue = res.tracks;
      currentIndex = 0;
      dislikedIds = new Set();
      hasScrolled = false;
      showFeed();
      renderReel(queue[0]);
      loadMoreTracks([]);
      toast('All genres · Shuffle on ♪');
    }
  } catch (e) {
    toast('Could not load tracks. Try again.');
  }
}

async function selectGenre(index) {
  const genre = GENRES[index];
  activeGenre = index;
  activeGenreQuery = genre.query; // lock feed to this genre query
  toast(`Loading ${genre.name}…`);
  showGenres();

  try {
    const res = await fetch('/api/tracks?genre=' + encodeURIComponent(genre.query)).then(r => r.json());
    if (res.tracks && res.tracks.length) {
      queue = res.tracks;
      currentIndex = 0;
      dislikedIds = new Set();
      hasScrolled = false;
      showFeed();
      renderReel(queue[0]);
      // Pre-load more — will stay locked to this genre
      loadMoreTracks([]);
      toast(`${genre.name} ♪`);
    } else {
      toast('No tracks found for this genre, try another!');
    }
  } catch (e) {
    toast('Could not load genre. Try again.');
  }
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
boot();
</script>
