<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SoundWave — Discover Music</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #080810; --text: #f0eff8; --muted: rgba(240,239,248,0.5);
    --accent: #c8ff57; --accent-dim: rgba(200,255,87,0.12);
    --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--black); color: var(--text); font-family: var(--font-body); }

  .bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(200,255,87,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 20%, rgba(77,121,255,0.08) 0%, transparent 70%);
  }

  .center {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; gap: 0; padding: 40px;
  }

  .logo { font-family: var(--font-head); font-size: 48px; font-weight: 800; letter-spacing: -2px; margin-bottom: 8px; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 16px; color: var(--muted); font-weight: 300; margin-bottom: 64px; }

  .rings-wrap { position: relative; width: 220px; height: 220px; margin-bottom: 64px; display: flex; align-items: center; justify-content: center; }
  .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(200,255,87,0.15); animation: pulse 3s ease-in-out infinite; }
  .ring:nth-child(1) { width: 80px; height: 80px; border-color: rgba(200,255,87,0.5); }
  .ring:nth-child(2) { width: 130px; height: 130px; border-color: rgba(200,255,87,0.25); animation-delay: 0.5s; }
  .ring:nth-child(3) { width: 180px; height: 180px; animation-delay: 1s; }
  .ring:nth-child(4) { width: 220px; height: 220px; border-color: rgba(200,255,87,0.05); animation-delay: 1.5s; }
  .note { position: absolute; font-size: 26px; animation: floatnote 4s ease-in-out infinite; }
  .note:nth-child(5) { top: 10px; left: 20px; }
  .note:nth-child(6) { top: 30px; right: 10px; animation-delay: 1.3s; }
  .note:nth-child(7) { bottom: 20px; left: 30px; animation-delay: 0.7s; }
  .note:nth-child(8) { bottom: 10px; right: 20px; animation-delay: 2s; }

  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.6; } }
  @keyframes floatnote { 0%,100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-10px) rotate(5deg); } }

  .spotify-login {
    display: flex; align-items: center; gap: 12px;
    background: #1db954; color: #000;
    border: none; border-radius: 100px;
    padding: 16px 32px;
    font-family: var(--font-body); font-size: 16px; font-weight: 500;
    cursor: pointer; text-decoration: none;
    transition: transform 0.15s, filter 0.15s;
    margin-bottom: 16px;
  }
  .spotify-login:hover { transform: translateY(-2px); filter: brightness(1.08); }
  .spotify-login:active { transform: scale(0.97); }
  .spotify-login svg { width: 22px; height: 22px; flex-shrink: 0; }

  .legal { font-size: 12px; color: rgba(240,239,248,0.3); text-align: center; max-width: 280px; line-height: 1.7; }

  .error-msg {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: rgba(255,80,80,0.15); border: 1px solid rgba(255,80,80,0.3);
    color: #ff9999; font-size: 13px; padding: 10px 20px; border-radius: 100px;
    display: none;
  }
  .error-msg.show { display: block; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="center">
  <div class="logo">Sound<span>Wave</span></div>
  <div class="tagline">Discover music that moves you</div>

  <div class="rings-wrap">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <span class="note">♪</span>
    <span class="note">♫</span>
    <span class="note">♩</span>
    <span class="note">♬</span>
  </div>

  <a href="/auth/login" class="spotify-login">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
    </svg>
    Continue with Spotify
  </a>
  <div class="legal">Requires a Spotify Premium account. By continuing, you agree to our Terms of Service.</div>
</div>

<div class="error-msg" id="err"></div>

<script>
  const params = new URLSearchParams(location.search);
  if (params.get('error')) {
    const el = document.getElementById('err');
    el.textContent = params.get('error') === 'access_denied'
      ? 'Login was cancelled.' : 'Something went wrong. Please try again.';
    el.classList.add('show');
  }
</script>
</body>
</html>
